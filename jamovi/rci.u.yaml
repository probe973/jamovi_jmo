title: Reliable Change
name: rci
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Pre-test Variable
        children:
          - type: VariablesListBox
            name: pre
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Post-test Variable
        children:
          - type: VariablesListBox
            name: post
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: reliability
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: useClinicalChange
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: method
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: normalMean
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: normalSd
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: clinicalMean
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: clinicalSd
        format: number
