name: Build Windows Module
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install and Build
        run: |
          repos <- c(CRAN = "https://cloud.r-project.org", jamovi = "https://repo.jamovi.org")
          install.packages(c('jmvcore', 'jmvtools'), repos=repos)
          library(jmvtools)
          jmvtools::check()
          # This command finds the .jmo file and moves it to the main folder
          Get-ChildItem -Path . -Filter *.jmo -Recurse | Move-Item -Destination . -Force
        shell: pwsh

      - name: Upload .jmo File
        uses: actions/upload-artifact@v4
        with:
          name: windows-module
          path: "*.jmo"
