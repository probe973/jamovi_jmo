name: Build Windows Module
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install and Build
        run: |
          # Define both the standard R repo and the jamovi repo
          repos <- c(CRAN = "https://cloud.r-project.org", jamovi = "https://repo.jamovi.org")
          
          # Install the core pieces first, then the tools
          install.packages('jmvcore', repos=repos)
          install.packages('jmvtools', repos=repos)
          
          # Now try to build your module
          library(jmvtools)
          jmvtools::install()
        shell: Rscript {0}

      - name: Upload .jmo File
        uses: actions/upload-artifact@v4
        with:
          name: windows-module
          path: "build/*.jmo"
