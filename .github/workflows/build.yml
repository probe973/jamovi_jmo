name: Build jamovi Module
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Install Tools
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          # Install from CRAN only to avoid the connection errors you just had
          install.packages(c('jmvcore', 'jmvtools', 'R6', 'base64enc', 'jsonlite'))
        shell: Rscript {0}

      - name: Build Module
        run: |
          # 'check' is the secret—it compiles everything and produces the .jmo 
          # when 'home' is set to the current directory.
          jmvtools::check(home='.')
        shell: Rscript {0}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-module
          path: "**/*.jmo"
