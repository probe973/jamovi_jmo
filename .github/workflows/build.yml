name: Build Windows Module
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install and Build
        run: |
          repos <- c(CRAN = "https://cloud.r-project.org", jamovi = "https://repo.jamovi.org")
          install.packages(c('jmvcore', 'jmvtools'), repos=repos)
          library(jmvtools)
          # 'check' is the correct command to build the .jmo file in the current folder
          jmvtools::check() 
        shell: Rscript {0}

      - name: Upload .jmo File
        uses: actions/upload-artifact@v4
        with:
          name: windows-module
          path: "./*.jmo"
