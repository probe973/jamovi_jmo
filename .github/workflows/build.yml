name: Build jamovi module

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Build jmo
        shell: Rscript {0}
        run: |
          options(repos = c(
            CRAN = "https://cloud.r-project.org",
            jamovi = "https://repo.jamovi.org"
          ))

          install.packages(c("jmvcore", "jmvtools"))

          jmvtools::install(".")

          lib <- .libPaths()[1]
          jmo <- list.files(
            file.path(lib, "jmv"),
            recursive = TRUE,
            pattern = "\\.jmo$",
            full.names = TRUE
          )

          file.copy(jmo, ".", overwrite = TRUE)

      - uses: actions/upload-artifact@v4
        with:
          name: jamovi-module
          path: "*.jmo"
