name: Build jamovi module

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install jmvtools
        run: |
          Rscript -e 'options(repos=c(CRAN="https://cloud.r-project.org", jamovi="https://repo.jamovi.org")); install.packages(c("jmvcore","jmvtools"))'

      - name: Prepare module
        run: |
          Rscript -e 'jmvtools::prepare()'

      - name: Install module (forces build)
        run: |
          Rscript -e 'jmvtools::install(".", lib="module-lib")'

      - name: Locate .jmo
        run: |
          find module-lib -name "*.jmo" -print

      - name: Copy .jmo
        run: |
          cp $(find module-lib -name "*.jmo" | head -n 1) ./module.jmo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jamovi-module
          path: module.jmo
