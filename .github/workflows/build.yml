name: Build jamovi module

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install remotes
        shell: Rscript {0}
        run: |
          install.packages("remotes", repos="https://cloud.r-project.org")

      - name: Install jmvtools from GitHub
        shell: Rscript {0}
        run: |
          remotes::install_github("jamovi/jmvtools")

      - name: Build module
        shell: Rscript {0}
        run: |
          jmvtools::build()

      - name: Upload module
        uses: actions/upload-artifact@v4
        with:
          name: jamovi-module
          path: "*.jmo"
