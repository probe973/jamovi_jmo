name: Build Windows Module
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          install-r: true

      - name: Install jmvtools
        run: |
          install.packages('jmvtools', repos='https://repo.jamovi.org')
        shell: Rscript {0}

      - name: Build Module
        run: |
          jmvtools::install()
        shell: Rscript {0}

      - name: Upload .jmo File
        uses: actions/upload-artifact@v4
        with:
          name: windows-module
          path: "*.jmo"
