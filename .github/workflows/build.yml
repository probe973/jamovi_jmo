name: Build jamovi Module

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install jmvtools
        run: |
          install.packages("jmvtools", repos="https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Build module
        run: |
          jmvtools::build()
        shell: Rscript {0}

      - name: Upload module
        uses: actions/upload-artifact@v4
        with:
          name: jamovi-module
          path: "*.jmo"
``
