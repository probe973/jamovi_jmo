name: Build Windows Module
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        run: |
          install.packages(c('jmvtools', 'R6', 'Rcpp'), repos='https://cloud.r-project.org')
        shell: Rscript {0}

      - name: Build Module
        run: |
          library(jmvtools)
          jmvtools::install()
        shell: Rscript {0}

      - name: Upload .jmo File
        uses: actions/upload-artifact@v4
        with:
          name: windows-module
          path: "*.jmo"
