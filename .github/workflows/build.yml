name: Build jamovi module

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install jmvtools
        shell: Rscript {0}
        run: |
          install.packages(
            "jmvtools",
            repos=c("https://repo.jamovi.org","https://cloud.r-project.org")
          )

      - name: Build module
        shell: Rscript {0}
        run: |
          jmvtools::build()

      - uses: actions/upload-artifact@v4
        with:
          name: jamovi-module
          path: "*.jmo"
