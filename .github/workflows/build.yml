name: Build jamovi module

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        run: |
          Rscript -e 'options(repos=c(CRAN="https://cloud.r-project.org", jamovi="https://repo.jamovi.org")); install.packages(c("jmvcore","jmvtools"))'

      - name: Build module
        run: |
          Rscript -e 'jmvtools::install(".", build=TRUE)'

      - name: Find .jmo
        run: |
          find $HOME -name "*.jmo"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jamovi-module
          path: |
            ~/.local/share/R/*
            ~/R/*
            **/*.jmo
